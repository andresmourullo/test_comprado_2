// Nota: Para este ejemplo, he añadido solo dos del objeto que pasaste, 
// pero el código funcionará con la lista completa que pegues aquí.
const fullData = [...preguntasData]; // Aquí iría todo tu JSON pegado.

let preguntasTest = [];
let currentIndex = 0;
let correctas = 0;

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function mostrarPregunta() {
    const container = document.getElementById('testContainer');
    container.innerHTML = "";
    
    if (currentIndex >= preguntasTest.length) {
        document.getElementById('result').textContent = `Test terminado. Has acertado ${correctas} de ${preguntasTest.length} preguntas.`;
        return;
    }

    const p = preguntasTest[currentIndex];
    const div = document.createElement('div');
    div.classList.add('question-box');
    
    // Construir opciones dinámicamente
    let opcionesHTML = p.opciones.map((opt, index) => `
        <label>
            <input type="radio" name="respuesta" value="${index}"> 
            ${opt.texto}
        </label>
    `).join('');

    div.innerHTML = `<h2>${currentIndex + 1}. ${p.enunciado}</h2>
                    <div class="options">${opcionesHTML}</div>`;
    
    const btn = document.createElement('button');
    btn.textContent = currentIndex === preguntasTest.length - 1 ? "Terminar Test" : "Validar y Siguiente";
    
    let mostradoResultado = false;

    btn.onclick = () => {
        const selected = document.querySelector('input[name="respuesta"]:checked');
        if (!mostradoResultado) {
            if (!selected) {
                alert("Selecciona una respuesta");
                return;
            }

            const indexSeleccionado = parseInt(selected.value);
            const esCorrecta = p.opciones[indexSeleccionado].esCorrecta;
            
            const resultadoDiv = document.createElement('div');
            resultadoDiv.style.fontWeight = 'bold';
            resultadoDiv.style.marginTop = '10px';

            if (esCorrecta) {
                resultadoDiv.innerHTML = "✅ ¡Correcto!";
                resultadoDiv.style.color = "green";
                correctas++;
            } else {
                const correctaTexto = p.opciones.find(o => o.esCorrecta).texto;
                resultadoDiv.innerHTML = `❌ Incorrecto. La respuesta correcta es: <br><em>${correctaTexto}</em>`;
                resultadoDiv.style.color = "red";
            }

            // Mostrar explicación
            const expDiv = document.createElement('div');
            expDiv.classList.add('explanation');
            expDiv.innerHTML = `<strong>Explicación:</strong><br>${p.explicacionCorrecta}`;
            
            div.appendChild(resultadoDiv);
            div.appendChild(expDiv);

            document.querySelectorAll('input[name="respuesta"]').forEach(input => input.disabled = true);
            btn.textContent = currentIndex === preguntasTest.length - 1 ? "Finalizar" : "Siguiente Pregunta";
            mostradoResultado = true;
        } else {
            currentIndex++;
            mostrarPregunta();
        }
    };
    
    div.appendChild(btn);
    container.appendChild(div);
}

document.getElementById('startTest').addEventListener('click', () => {
    // Al ser JSON directo, cargamos toda la lista (puedes filtrar por ID u orden si quieres)
    preguntasTest = shuffle([...fullData]); 
    currentIndex = 0;
    correctas = 0;
    document.getElementById('result').textContent = "";
    mostrarPregunta();
});

document.getElementById('finishTest').addEventListener('click', () => {
    document.getElementById('testContainer').innerHTML = "";
    document.getElementById('result').textContent = `Test finalizado. Aciertos: ${correctas} de ${currentIndex} respondidas.`;
});
</script>
