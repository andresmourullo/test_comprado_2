                    mostrarPregunta();
                }
            };

            div.appendChild(btn);
            container.appendChild(div);
        }

        document.getElementById('startTest').addEventListener('click', () => {
            const selectedOptions = Array.from(document.getElementById('temaSelect').selectedOptions).map(o => o.value);

            if (selectedOptions.length === 0) {
                alert("Selecciona al menos un tema");
                return;
            }

            // Combina los arrays de las categorías seleccionadas
            preguntasTest = selectedOptions.flatMap(tema => mapasPreguntas[tema] || []);

            preguntasTest = shuffle([...preguntasTest]);
            currentIndex = 0;
            correctas = 0;
            document.getElementById('result').textContent = "";
            mostrarPregunta();
        });

        document.getElementById('finishTest').addEventListener('click', () => {
            document.getElementById('testContainer').innerHTML = "";
            document.getElementById('result').textContent = `Test finalizado. Aciertos: ${correctas} de ${currentIndex} respondidas.`;
        });
    </script>
</body>

</html>
